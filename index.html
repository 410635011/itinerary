<!doctype html>
<!-- version: single-html-modular-v31-trip-title-bg-fixed -->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>旅程行程表 v37</title>
  <style>
    :root {
      --bg:#fff9f6; --card:#fff; --ink:#3a1f2b; --muted:#7a5a68; --accent:#e64b5f;
      --shadow:rgba(58,31,43,.15); --radius:18px; --border:2px solid var(--ink);
      --soft-line:2px dashed rgba(58,31,43,.25); --soft-border:2px dashed rgba(58,31,43,.28);
      --card-shadow:6px 6px 0 var(--shadow); --chip-shadow:2px 2px 0 var(--shadow);
      --input-shadow:3px 3px 0 var(--shadow); --soft-panel-shadow:4px 4px 0 rgba(58,31,43,.09);
      --delete:#7f1d1d; --delete-hover:#5c0f0f;
      --material-texture: url("https://410635011.github.io/itinerary/texture.png");
    }
    * { box-sizing:border-box; }
    html { min-height:100%; background:var(--material-texture), var(--bg); }
    body {
      min-height:100%; margin:0; color:var(--ink); line-height:1.5; position:relative; background:var(--material-texture), var(--bg);
      font-family:ui-rounded,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body::before {
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
      background:var(--material-texture), radial-gradient(circle at 12% 12%, rgba(230,75,95,.18), transparent 40%),
        radial-gradient(circle at 88% 18%, rgba(243,201,74,.2), transparent 42%),
        radial-gradient(circle at 30% 88%, rgba(181,140,255,.18), transparent 40%), var(--bg);
      background-repeat:no-repeat;
      background-size:cover;
    }
    :is(header,.btnRow,.dayLeft,.dayActions,.itemHeader,.check,.itemMain,.itemTitle,.tags,label,.panelHeader,.panelTitle,.panelActions,.expenseList li,.expenseMain,.summary,.summaryRow,.summaryList,.formActions,.footerHint,.cardActions) { display:flex; }
    :is(.sub,label,.itemSub,.dayMeta,.tiny,.panelNote,.empty,.expenseMeta,.panelHint,.summaryTitle) { color:var(--muted); }
    :is(.sub,.itemSub) { font-size:13px; }
    :is(label,.dayMeta,.pill,.panelNote,.empty,.expenseList,.summary,.panelHint) { font-size:12px; }
    :is(label,.itemMain,.summary) { flex-direction:column; }
    .wrap { position:relative; z-index:1; max-width:1100px; margin:auto; padding:18px 14px 40px; }
    header { align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
    h1 { margin:0; }
    .appTitle { display:flex; align-items:center; gap:10px; flex-wrap:wrap; letter-spacing:.3px; line-height:1.18; }
    .appTitleTrip { display:inline-flex; align-items:center; min-height:42px; max-width:min(620px,70vw); padding:0; border:0; border-radius:0; background:transparent; box-shadow:none; color:#4a2a18; font-size:32px; font-weight:950; letter-spacing:.8px; overflow-wrap:anywhere; text-shadow:0 2px 0 rgba(58,31,43,.08); }
    .appTitleSuffix { font-size:14px; font-weight:900; }
    label { gap:6px; }

    :is(.panel,details.day,.cardItem) { border:var(--border); border-radius:var(--radius); background:var(--material-texture), var(--card); box-shadow:var(--card-shadow); }
    .panel { position:relative; overflow:hidden; padding:14px; }
    .panel::before { content:""; position:absolute; inset:-40px -40px auto auto; width:120px; height:120px; pointer-events:none; border:var(--soft-line); border-radius:26px; transform:rotate(12deg); background:var(--material-texture), rgba(181,140,255,.2); }
    .controls { display:grid; grid-template-columns:1.2fr .9fr .9fr; gap:10px; align-items:end; margin-bottom:12px; }

    :is(input[type="search"],input[type="url"],input[type="password"],input[type="text"],.expenseForm input,.itemForm input,.addDayForm input,select,textarea,button) { border:var(--border); border-radius:14px; background:var(--material-texture), #fff; box-shadow:var(--input-shadow); color:var(--ink); font:inherit; font-size:14px; }
    :is(input[type="search"],input[type="url"],input[type="password"],input[type="text"],.expenseForm input,.itemForm input,.addDayForm input,select,textarea) { width:100%; padding:10px 12px; outline:none; }
    textarea { min-height:84px; resize:vertical; }
    button { padding:10px 12px; cursor:pointer; user-select:none; transition:transform .05s ease; font-size:13px; }
    button:active { transform:translate(1px,1px); box-shadow:var(--chip-shadow); }
    button.primary { background:var(--material-texture), rgba(230,75,95,.25); }
    button.danger { background:var(--material-texture), rgba(243,201,74,.35); }
    .btnRow { gap:8px; justify-content:flex-end; flex-wrap:wrap; }

    details.day { margin:12px 0; overflow:hidden; }
    details.day[open] summary { border-bottom:var(--soft-line); }
    summary { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; list-style:none; cursor:pointer; user-select:none; background:var(--material-texture), linear-gradient(90deg,rgba(230,75,95,.2),rgba(181,140,255,.18),rgba(243,201,74,.2)); }
    summary::-webkit-details-marker { display:none; }
    .tripSummary summary { background:var(--material-texture), linear-gradient(90deg,rgba(243,201,74,.25),rgba(230,75,95,.18),rgba(181,140,255,.18)); }
    .dayLeft { align-items:center; gap:10px; flex-wrap:wrap; }
    .dayActions { align-items:center; gap:8px; flex:0 0 auto; }
    .addItemBtn { padding:6px 10px; border-radius:999px; font-size:12px; white-space:nowrap; }
    :is(.dayTitle,.itemTitle,.panelTitle,.summaryTitle,.chip,.tripDailyExpenseDay) { font-weight:800; }
    .content { padding:12px 14px 14px; }

    .cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; align-items:start; }
    .cardItem { position:relative; overflow:hidden; padding:12px; isolation:isolate; }
    .itemHeader { align-items:flex-start; gap:10px; min-height:52px; padding-right:118px; }
    .check { align-items:center; min-width:20px; margin-top:2px; }
    input[type="checkbox"] { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }
    .itemMain { width:100%; gap:2px; }
    .itemTitle { align-items:center; gap:8px; flex-wrap:wrap; }
    .strike { color:rgba(58,31,43,.55); text-decoration:line-through; }
    .tags,.linkButtons { gap:6px; flex-wrap:wrap; margin-top:6px; }
    .linkButtons { display:flex; }
    .linkBtn { color:var(--ink); text-decoration:none; background:var(--material-texture), rgba(230,75,95,.12); }
    .linkBtn:hover,.linkBtn:focus-visible { background:var(--material-texture), rgba(230,75,95,.22); }
    :is(.pill,.tag) { border:var(--border); border-radius:999px; background:var(--material-texture), #fff; box-shadow:var(--chip-shadow); white-space:nowrap; }
    .pill { padding:5px 10px; }
    .tag { padding:4px 8px; font-size:11px; background:var(--material-texture), rgba(243,201,74,.3); }
    .place-tag { cursor:pointer; }
    .tag.corner { position:absolute; right:-2px; bottom:-2px; display:flex; align-items:flex-end; justify-content:flex-end; width:55px; height:45px; padding:6px; border:0!important; border-radius:0 0 14px; clip-path:polygon(100% 0,100% 100%,0 100%); }
    .corner-text { display:inline-block; transform:rotate(-43deg); font-size:12px; }
    .transport { background:var(--material-texture), #d7ecff; } .food { background:var(--material-texture), #FCDEBF; } .sight { background:var(--material-texture), #CDE3CE; } .stay { background:var(--material-texture), #E3C8EA; } .shopping { background:var(--material-texture), #FACFDE; }

    :is(.noteArea,.noteBox,.expensePanel,.itemFormPanel,.tripDailyExpenseRow) { border:var(--soft-border); border-radius:var(--radius); box-shadow:var(--soft-panel-shadow); }
    .noteArea { margin-top:8px; padding:10px; background:var(--material-texture), rgba(181,140,255,.10); cursor:text; }
    .noteArea:focus-visible { outline:3px solid rgba(230,75,95,.22); outline-offset:2px; }
    .noteArea.is-editing { padding:0; border:var(--border); background:var(--material-texture), #fff; box-shadow:var(--input-shadow); }
    .noteBox { margin-top:12px; padding:10px; background:var(--material-texture), rgba(181,140,255,.10); }
    .noteBox > .noteArea:not(.is-editing) { padding:0; border:0; border-radius:0; background:transparent; box-shadow:none; }
    .noteText { min-height:30px; margin:0; white-space:pre-wrap; word-break:break-word; font-size:13px; }
    .noteText.empty { color:var(--muted); font-style:italic; }
    .noteEditor { display:block; min-height:86px; margin:0; border:0; background:transparent; box-shadow:none; resize:vertical; }

    .itemFormPanel { margin:0 0 12px; padding:10px; background:var(--material-texture), rgba(230,75,95,.10); }
    .itemFormTitle { margin-bottom:8px; font-size:13px; font-weight:800; }
    .itemForm { display:grid; grid-template-columns:minmax(120px,.55fr) minmax(130px,.55fr) minmax(120px,.45fr); grid-template-areas:"timeCode time type" "title title title" "place place place" "links links links" "actions actions actions"; gap:8px; align-items:end; }
    .itemForm select[name="timeCode"]{grid-area:timeCode}.itemForm input[name="time"]{grid-area:time}.itemForm select[name="type"]{grid-area:type}.itemForm input[name="title"]{grid-area:title}.itemForm input[name="place"]{grid-area:place}.itemLinks{grid-area:links;display:grid;gap:8px}.itemLinkRow{display:grid;grid-template-columns:minmax(120px,.38fr) minmax(180px,1fr) 42px;gap:8px;align-items:end}.itemLinkRow button{width:42px;min-width:0;min-height:40px;padding:8px 0;border-radius:14px}.formActions{grid-area:actions;justify-content:flex-end;gap:8px;flex-wrap:wrap}

    .expensePanel { margin-top:10px; padding:10px; background:var(--material-texture), rgba(243,201,74,.16); }
    .dailyExpensePanel,.tripSummaryPanel { border-style:solid; background:var(--material-texture), linear-gradient(135deg,rgba(243,201,74,.22),rgba(255,249,246,.82)); }
    .panelHeader { align-items:center; justify-content:space-between; gap:10px; }
    .panelTitle { display:inline-flex; align-items:center; gap:6px; font-size:13px; }
    .panelHint { font-weight:400; }
    .panelActions { align-items:center; gap:6px; flex:0 0 auto; }
    :is(.panelNote,.empty) { margin-top:8px; line-height:1.5; }
    .noteBtn { flex:0 0 auto; width:30px; height:30px; padding:0; border-radius:999px; line-height:1; box-shadow:var(--chip-shadow); }
    .noteBtn.is-active { background:var(--material-texture), rgba(230,75,95,.18); color:#fff; }
    .expenseListActions { display:flex; justify-content:flex-start; gap:8px; margin:8px 0 0; }
    .dayToolActions { display:flex; justify-content:flex-end; gap:6px; margin-top:10px; flex-wrap:wrap; }
    .dayToolActions .itemActionBtn { width:32px; height:32px; }
    .cardActions { position:absolute; top:10px; right:10px; align-items:center; justify-content:flex-end; gap:6px; z-index:5; width:max-content; max-width:calc(100% - 20px); flex-wrap:nowrap; }
    .itemActionBtn { position:static; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; padding:0; border-radius:999px; line-height:1; background:var(--material-texture), #fff; box-shadow:var(--chip-shadow); }
    .itemActionBtn.is-active { background:var(--material-texture), rgba(230,75,95,.18); }
    .expenseForm { display:grid; grid-template-columns:minmax(0,1fr) minmax(120px,.45fr) minmax(96px,.28fr) minmax(96px,.28fr) 54px; grid-template-areas:"name name name amount amount" "date date from to submit"; gap:8px; align-items:end; margin-top:8px; }
    :is(.expenseForm,.itemForm,.addDayForm) :is(input,select,textarea) { min-width:0; min-height:40px; padding:8px 10px; border-radius:14px; font-size:13px; }
    .expenseForm textarea[name="name"]{grid-area:name;min-height:74px}.expenseForm input[name="amount"]{grid-area:amount}.expenseForm input[name="rateDate"]{grid-area:date;min-width:150px}.expenseForm select[name="from"]{grid-area:from;min-width:86px}.expenseForm select[name="to"]{grid-area:to;min-width:86px}.expenseForm button[type="submit"]{grid-area:submit;justify-self:end;width:54px;min-width:0;min-height:40px;padding:8px 4px;white-space:nowrap}
    .expenseList { margin:8px 0 0; padding:0; list-style:none; }
    .expenseList li { align-items:flex-start; justify-content:space-between; gap:8px; margin-top:7px; }
    .expenseMain { flex:1 1 auto; flex-wrap:wrap; justify-content:space-between; align-items:flex-end; gap:6px 12px; min-width:0; line-height:1.7; }
    .expenseNameBox { display:inline-flex; align-items:flex-start; gap:4px; flex:0 1 auto; max-width:100%; padding:4px 8px; border:2px solid rgba(58,31,43,.35); border-radius:12px; background:var(--material-texture), rgba(181,140,255,.16); box-shadow:var(--chip-shadow); }
    .expenseNameText { white-space:pre-wrap; overflow-wrap:anywhere; }
    .expenseInfo { display:inline-block; flex:0 0 auto; align-self:flex-end; margin-left:auto; max-width:100%; overflow-x:auto; white-space:nowrap; text-align:right; }
    .summary { gap:7px; margin-top:10px; padding-top:9px; border-top:2px dashed rgba(58,31,43,.18); }
    .summaryRow { align-items:center; justify-content:space-between; gap:8px 12px; flex-wrap:wrap; }
    .summaryTitle { flex:0 0 auto; white-space:nowrap; }
    .summaryList { justify-content:flex-end; gap:6px; flex:1 1 auto; flex-wrap:wrap; }
    .chip { padding:4px 8px; border:2px solid rgba(58,31,43,.28); border-radius:999px; box-shadow:var(--chip-shadow); white-space:nowrap; }
    .chip.from { background:var(--material-texture), rgba(243,201,74,.22); } .chip.to { background:var(--material-texture), rgba(230,75,95,.12); }
    button.expenseDelete { appearance:none; flex:0 0 auto; width:auto; min-width:0; min-height:0; padding:0 6px; border:0; border-radius:0; background:transparent; box-shadow:none; color:var(--delete); font-size:14px; font-weight:800; line-height:1; }
    button.expenseDelete:hover,button.expenseDelete:focus-visible { color:var(--delete-hover); }
    button.expenseDelete:active { transform:none; box-shadow:none; }
    .tripDailyExpenseList { display:grid; gap:8px; margin-top:10px; }
    .tripDailyExpenseRow { padding:9px; background:var(--material-texture), rgba(255,255,255,.55); }
    .tripDailyExpenseRow .summary { margin-top:7px; }
    .tripDailyExpenseDay { font-size:13px; }
    .syncControls { display:grid; grid-template-columns:1.35fr .75fr; gap:10px; align-items:end; }
    .tripPicker { display:grid; grid-template-columns:minmax(0,1fr) minmax(180px,.55fr); gap:10px; align-items:end; margin-top:10px; }
    .syncOptions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    label.inlineCheck { flex-direction:row; align-items:center; gap:8px; color:var(--ink); }
    label.inlineCheck input { width:auto; box-shadow:none; }
    .syncActions { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .syncStatus { min-height:18px; margin-top:8px; font-size:12px; color:var(--muted); white-space:pre-wrap; }
    .syncStatus.error { color:var(--delete); font-weight:800; }

    .tripEditPanel { margin-top:10px; padding:10px; border:var(--soft-border); border-radius:var(--radius); background:var(--material-texture), rgba(230,75,95,.08); box-shadow:var(--soft-panel-shadow); }
    .addDayForm { display:grid; grid-template-columns:minmax(110px,.38fr) minmax(180px,1fr) auto auto; gap:8px; align-items:end; margin-top:8px; }
    .addDayForm[hidden] { display:none; }
    .tripDeleteBtn { color:var(--delete); background:var(--material-texture), rgba(127,29,29,.08)!important; }
    .itemActionBtn.tripDeleteBtn { color:var(--delete); background:var(--material-texture), rgba(127,29,29,.08); }
    .editModeHint { margin-top:8px; font-size:12px; color:var(--muted); }
    .footerHint { justify-content:flex-end; margin-top:14px; }
    .tiny { font-size:11px; }
    @media (max-width:520px){ .appTitleTrip{font-size:24px;min-height:38px;max-width:100%;padding:5px 12px}.appTitleSuffix{font-size:20px} }
    @media (max-width:420px){ .itemHeader{padding-right:104px}.cardActions{gap:4px}.itemActionBtn{width:28px;height:28px} }

    @media (max-width:900px){ header{flex-direction:column}.controls,.syncControls,.tripPicker,.addDayForm{grid-template-columns:1fr} }
    @media (max-width:780px){ .cards{grid-template-columns:1fr}.expenseForm{grid-template-columns:1fr 1fr;grid-template-areas:"name name" "amount amount" "date date" "from to" "submit submit"}.itemForm{grid-template-columns:1fr 1fr;grid-template-areas:"timeCode time" "type type" "title title" "place place" "links links" "actions actions"}.itemLinkRow{grid-template-columns:minmax(0,.9fr) minmax(0,1.1fr) 42px}.expenseForm :is(input[name="rateDate"],select[name="from"],select[name="to"]){min-width:0} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1 class="appTitle" id="appTitle"><span class="appTitleTrip" id="appTitleTrip">旅程</span><span class="appTitleSuffix">行程表</span></h1>
      </div>
      <div class="btnRow">
        <button class="primary" id="btnToggleSync" type="button" aria-controls="syncPanel" aria-expanded="false">雲端同步</button>
        <button class="primary" id="btnToggleIndex" type="button" aria-controls="indexPanel" aria-expanded="false">開啟索引</button>
        <button class="primary" id="btnExpandAll" type="button">全部展開</button>
        <button class="primary" id="btnCollapseAll" type="button">全部收合</button>
        <button class="danger" id="btnReset" type="button" title="清除本機保存資料（會還原成這份 HTML 的內建行程）">重置保存資料</button>
      </div>
    </header>

    <section class="panel" id="syncPanel" aria-label="Google Sheet 雲端同步" hidden>
      <input id="remoteUrl" type="hidden" value="https://script.google.com/macros/s/AKfycbz6Y5kPrSU4yToumGbXXjQs4zz8pM1LyTT1mHntskjG_AcKPMSbLjm3QiDMvrqvz2Jo/exec" />
      <input id="remoteToken" type="hidden" value="8866" />
      <div class="tripPicker">
        <label>選擇旅程資料<select id="remoteTripSelect"><option value="">先載入清單，或直接輸入旅程 key</option></select></label>
        <label>旅程 key<input id="remoteTripKey" type="text" placeholder="tokyo / kyoto" autocomplete="off" /></label>
      </div>
      <div class="syncOptions">
        <label class="inlineCheck"><input id="remoteAutoLoad" type="checkbox" />開啟時自動載入雲端</label>
        <label class="inlineCheck"><input id="remoteAutoSave" type="checkbox" />修改後自動同步共享行程資料</label>
      </div>
      <div class="panelNote">註記、記帳明細只保存在本機。</div>

      <div class="syncActions">
        <div class="btnRow">
          <button class="primary" id="btnRemoteLoad" type="button">匯入旅程資料</button>
          <button class="primary" id="btnRemoteSave" type="button">同步至雲端</button>
        </div>
        
      </div>
      <div class="syncStatus" id="remoteStatus"></div>
      <div class="tripEditArea">
        <div class="btnRow">
          <button class="primary" id="btnToggleTripEdit" type="button">編輯項目</button>
        </div>
      <section class="tripEditPanel" id="tripEditPanel" hidden>
        <div class="panelHeader"><div class="panelTitle"><span aria-hidden="true">🧩</span><span>行程項目編輯</span><span class="panelHint">新增日項目，或刪除日項目 / 小項目</span></div></div>
        
        <div class="btnRow" style="margin-top:8px"><button class="primary" id="btnAddDayFormToggle" type="button">＋新增日項目</button></div>
        <form class="addDayForm" id="addDayForm" hidden>
          <input name="dayDate" type="date" autocomplete="off" required />
          <input name="dayTitle" placeholder="項目名稱，例如 第十天｜京都一日遊" autocomplete="off" required />
          <button type="button" id="btnAddDayCancel">取消</button>
          <button class="primary" type="submit">新增</button>
        </form>
      </section>
      </div>
    </section>

    <section class="panel" id="indexPanel" aria-label="行程索引與篩選" hidden>
      <div class="controls">
        <label>搜尋（地點/行程/備註/購物）<input id="q" type="search" placeholder="例如：淺草 / 富士山 / 迪士尼 / 壽司…" /></label>
        <label>篩選類型<select id="filterType"><option value="all">全部</option><option value="transport">交通</option><option value="sight">景點</option><option value="food">餐食</option><option value="stay">住宿</option><option value="shopping">購物</option></select></label>
        <label>顯示狀態<select id="filterStatus"><option value="all">全部</option><option value="todo">未完成</option><option value="done">已完成</option></select></label>
      </div>
      <div class="footerHint"><div class="tiny" id="stats"></div></div>
    </section>

    <main id="days"></main>
  </div>

  <script>
    (() => {
      "use strict";

      const C = {
        LS: {
          app:"cute_trip_app_v1", remote:"cute_trip_remote_config_v1",
          done:"cute_trip_v1", notes:"cute_trip_notes_v1", itemNotes:"cute_trip_item_notes_v1",
          expenses:"cute_trip_expenses_v1", currencyPrefs:"cute_trip_currency_prefs_v1",
          summaryNotes:"cute_trip_summary_notes_v1", customItems:"cute_trip_custom_items_v1"
        },
        type: {
          transport:["交通","transport"], food:["餐食","food"], sight:["景點","sight"],
          stay:["住宿","stay"], shopping:["購物","shopping"], other:["其他",""]
        },
        currencies:["JPY","TWD","USD","EUR","CNY","HKD","KRW","SGD","THB","GBP","AUD","CAD"],
        zero:new Set(["JPY","KRW"]),
        minRateDate:"1948-01-01",
        timeWeight:{ 清晨:360, 上午:540, 中午:720, 下午:840, 傍晚:1020, 晚餐:1080, 晚上:1140, 整天:480 }
      };

      const RawDays = [
        
      ];

      const Data = {
        seedItinerary: () => RawDays.map(([date, title, items, people = null], dayIndex) => ({
          id:`day-${dayIndex + 1}`, date, title, people,
          items: items.map(([time, title, type, place, detail = ""], itemIndex) => ({
            id:`item-${dayIndex + 1}-${itemIndex + 1}`, time, title, type, place, detail
          }))
        })),
        daySortValue(day, index = 0) {
          const raw = String(day?.date || "").trim();
          const md = raw.match(/(\d{1,2})\s*[\/.-]\s*(\d{1,2})/);
          if (md) return Number(md[1]) * 100 + Number(md[2]);
          const iso = raw.match(/\d{4}-(\d{2})-(\d{2})/);
          if (iso) return Number(iso[1]) * 100 + Number(iso[2]);
          return 100000 + index;
        },
        sortItinerary(days) {
          return [...(Array.isArray(days) ? days : [])]
            .map((day, index) => ({ day, index, value:Data.daySortValue(day, index) }))
            .sort((a, b) => a.value - b.value || a.index - b.index)
            .map(row => row.day);
        },
        normalizeItem(item = {}, fbItem = {}, dayIndex = 0, itemIndex = 0) {
          const id = item?.id || fbItem.id || `item-${dayIndex + 1}-${itemIndex + 1}`;
          return {
            id:String(id),
            time:String(item?.time ?? fbItem.time ?? ""),
            timeCode:String(item?.timeCode ?? fbItem.timeCode ?? ""),
            title:String(item?.title || fbItem.title || "未命名項目"),
            type:C.type[item?.type] ? item.type : (C.type[fbItem.type] ? fbItem.type : "sight"),
            place:String(item?.place ?? fbItem.place ?? ""),
            detail:String(item?.detail ?? fbItem.detail ?? ""),
            links:Array.isArray(item?.links) ? item.links : []
          };
        },
        normalizeItinerary(days) {
          const fallback = Data.seedItinerary();
          if (!Array.isArray(days) || !days.length) return fallback;
          const normalized = days.map((day, dayIndex) => {
            const fbDay = fallback[dayIndex] || {};
            const date = String(day?.date || fbDay.date || `day-${dayIndex + 1}`);
            return {
              id:String(day?.id || fbDay.id || `day-${dayIndex + 1}`),
              date,
              title:String(day?.title || fbDay.title || "未命名天數"),
              people:day?.people ?? fbDay.people ?? null,
              items:Array.isArray(day?.items) ? day.items.map((item, itemIndex) => Data.normalizeItem(item, fbDay.items?.[itemIndex] || {}, dayIndex, itemIndex)) : (fbDay.items || [])
            };
          });
          return Data.sortItinerary(normalized);
        },
        mergeCustomItems(data) {
          const itinerary = Data.normalizeItinerary(data.itinerary);
          const customItems = data.customItems && typeof data.customItems === "object" ? { ...data.customItems } : {};
          const done = data.done && typeof data.done === "object" ? { ...data.done } : {};
          const notes = data.notes || {};
          const itemNotes = { ...(notes.item || {}) };
          const expenses = data.expenses && typeof data.expenses === "object" ? { ...data.expenses } : {};

          itinerary.forEach((day, dayIndex) => {
            const rows = Array.isArray(customItems[day.date]) ? customItems[day.date] : [];
            if (!rows.length) return;
            rows.forEach((row, rowIndex) => {
              const id = String(row?.id || `custom-${Date.now()}-${dayIndex}-${rowIndex}`);
              if (day.items.some(item => String(item.id) === id)) return;
              const nextIndex = day.items.length;
              day.items.push(Data.normalizeItem({ ...row, id }, {}, dayIndex, nextIndex));
              const oldKey = `${day.date}::custom::${id}`;
              const newKey = `${day.date}::${nextIndex}`;
              if (Object.prototype.hasOwnProperty.call(done, oldKey)) {
                done[newKey] = done[oldKey];
                delete done[oldKey];
              }
              if (Object.prototype.hasOwnProperty.call(itemNotes, oldKey)) {
                itemNotes[newKey] = itemNotes[oldKey];
                delete itemNotes[oldKey];
              }
              const oldExpense = `item::${oldKey}`, newExpense = `item::${newKey}`;
              if (Object.prototype.hasOwnProperty.call(expenses, oldExpense)) {
                expenses[newExpense] = expenses[oldExpense];
                delete expenses[oldExpense];
              }
            });
            delete customItems[day.date];
          });

          return {
            itinerary:Data.sortItinerary(itinerary),
            customItems,
            done,
            notes:{ day:notes.day || {}, item:itemNotes, summary:notes.summary || {} },
            expenses
          };
        }
      };

      const Store = {
        legacyKeys:["done","notes","itemNotes","summaryNotes","customItems","expenses","currencyPrefs"],
        keyOf:value => String(value || "trip").trim() || "trip",
        defaults: (tripKey = "trip") => ({
          version:1, tripKey:Store.keyOf(tripKey), updatedAt:null, itinerary:Data.seedItinerary(), done:{}, notes:{ day:{}, item:{}, summary:{} },
          expenses:{}, customItems:{}, currencyPrefs:{ from:"JPY", to:"TWD", rateDate:new Date().toISOString().slice(0, 10) }
        }),
        parse(raw, fallback = {}) { try { return JSON.parse(raw) ?? fallback; } catch { return fallback; } },
        legacy() {
          return {
            done:Store.parse(localStorage.getItem(C.LS.done)),
            notes:{
              day:Store.parse(localStorage.getItem(C.LS.notes)),
              item:Store.parse(localStorage.getItem(C.LS.itemNotes)),
              summary:Store.parse(localStorage.getItem(C.LS.summaryNotes))
            },
            expenses:Store.parse(localStorage.getItem(C.LS.expenses)),
            customItems:Store.parse(localStorage.getItem(C.LS.customItems)),
            currencyPrefs:Store.parse(localStorage.getItem(C.LS.currencyPrefs), { from:"JPY", to:"TWD", rateDate:new Date().toISOString().slice(0, 10) })
          };
        },
        normalize(data = {}, tripKey = data?.tripKey || "trip") {
          const key = Store.keyOf(data?.tripKey || tripKey), base = Store.defaults(key);
          const merged = Data.mergeCustomItems({ ...base, ...data, itinerary:data.itinerary || base.itinerary });
          return {
            ...base, ...data,
            version:1,
            tripKey:key,
            itinerary:merged.itinerary,
            done:merged.done,
            notes:merged.notes,
            expenses:merged.expenses,
            customItems:merged.customItems,
            currencyPrefs:{ ...base.currencyPrefs, ...(data.currencyPrefs || {}) }
          };
        },
        syncStateData() {
          try {
            if (!State?.data) return;
            Object.assign(State.data, {
              itinerary:State.itinerary,
              done:State.done,
              notes:State.notes,
              expenses:State.expenses,
              customItems:State.customItems,
              currencyPrefs:State.currencyPrefs
            });
          } catch {}
        },
        shared(data = {}, tripKey = data?.tripKey || State?.remote?.key || "trip") {
          const key = Store.keyOf(tripKey);
          try { Store.syncStateData(); } catch {}
          let source = data;
          try { if (State?.data && Store.keyOf(State.data.tripKey || key) === key) source = State.data; } catch {}
          const normalized = Store.normalize(source, key);
          return {
            version:1,
            tripKey:key,
            updatedAt:new Date().toISOString(),
            itinerary:Data.normalizeItinerary(normalized.itinerary),
            done:normalized.done || {},
            customItems:normalized.customItems || {}
          };
        },
        hasLegacy: () => Store.legacyKeys.some(name => localStorage.getItem(C.LS[name]) !== null),
        cleanupLegacy: () => Store.legacyKeys.forEach(name => localStorage.removeItem(C.LS[name])),
        hub() {
          const raw = Store.parse(localStorage.getItem(C.LS.app), null);
          if (raw?.appStoreVersion === 2 && raw.trips && typeof raw.trips === "object") {
            const trips = {};
            Object.entries(raw.trips).forEach(([key, value]) => trips[Store.keyOf(key)] = Store.normalize(value, key));
            const currentTripKey = Store.keyOf(raw.currentTripKey || Object.keys(trips)[0] || "trip");
            return { appStoreVersion:2, currentTripKey, trips };
          }
          const remoteConfig = Store.parse(localStorage.getItem(C.LS.remote), {});
          const key = Store.keyOf(raw?.tripKey || remoteConfig.key || "trip");
          const data = Store.normalize(raw || Store.legacy(), key);
          return { appStoreVersion:2, currentTripKey:key, trips:{ [key]:data } };
        },
        loadTrip(tripKey) {
          const key = Store.keyOf(tripKey), hub = Store.hub();
          return Store.normalize(hub.trips[key] || Store.defaults(key), key);
        },
        load() {
          const remoteConfig = Store.parse(localStorage.getItem(C.LS.remote), {});
          const hub = Store.hub(), key = Store.keyOf(remoteConfig.key || hub.currentTripKey);
          const data = Store.normalize(hub.trips[key] || hub.trips[hub.currentTripKey] || Store.defaults(key), key);
          if (Store.hasLegacy() || Store.parse(localStorage.getItem(C.LS.app), null)?.appStoreVersion !== 2) Store.saveApp(data);
          Store.cleanupLegacy();
          return data;
        },
        saveApp(data) {
          Store.syncStateData();
          const hub = Store.hub();
          let stateKey = "";
          try { stateKey = State?.remote?.key || ""; } catch {}
          const key = Store.keyOf(data?.tripKey || stateKey || hub.currentTripKey);
          const normalized = Store.normalize({ ...data, tripKey:key }, key);
          normalized.version = 1;
          normalized.updatedAt = new Date().toISOString();
          hub.currentTripKey = key;
          hub.trips[key] = normalized;
          localStorage.setItem(C.LS.app, JSON.stringify(hub));
        },
        save({ sync = true } = {}) {
          Store.syncStateData();
          if (State?.remote?.key) State.data.tripKey = Store.keyOf(State.remote.key);
          Store.saveApp(State.data);
          if (sync) Remote.queueSave();
        },
        replace(data, { preservePrivate = false, tripKey = State?.remote?.key || data?.tripKey || "trip" } = {}) {
          const key = Store.keyOf(tripKey), incoming = Store.normalize({ ...data, tripKey:key }, key);
          const localTrip = Store.loadTrip(key);
          const normalized = preservePrivate
            ? Store.normalize({
                ...localTrip,
                tripKey:key,
                itinerary:incoming.itinerary,
                done:incoming.done,
                customItems:incoming.customItems,
                currencyPrefs:localTrip.currencyPrefs,
                notes:localTrip.notes,
                expenses:localTrip.expenses
              }, key)
            : incoming;
          State.data = normalized;
          State.itinerary = normalized.itinerary;
          State.done = normalized.done;
          State.notes = normalized.notes;
          State.expenses = normalized.expenses;
          State.customItems = normalized.customItems;
          State.currencyPrefs = Currency.normalize(normalized.currencyPrefs);
          State.data.currencyPrefs = State.currencyPrefs;
          Store.saveApp(State.data);
        },
        clear() {
          localStorage.removeItem(C.LS.app);
          Store.cleanupLegacy();
        }
      };
      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
      const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[char]));
      const todayISO = () => new Date().toISOString().slice(0, 10);
      const isISODate = value => /^\d{4}-\d{2}-\d{2}$/.test(String(value ?? ""));
      const dayDateLabel = value => {
        const raw = String(value ?? "").trim();
        const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return match ? `${Number(match[2])}/${match[3]}` : raw;
      };
      const clampRateDate = value => {
        const today = todayISO();
        if (!isISODate(value)) return today;
        return value < C.minRateDate ? C.minRateDate : value > today ? today : value;
      };

      const Currency = {
        normalize(prefs = {}) {
          const from = C.currencies.includes(prefs.from) ? prefs.from : "JPY";
          const to = C.currencies.includes(prefs.to) && prefs.to !== from ? prefs.to : C.currencies.find(cur => cur !== from) || "TWD";
          return { from, to, rateDate: clampRateDate(prefs.rateDate) };
        },
        save(from, to, rateDate = State.currencyPrefs.rateDate, { sync = false } = {}) {
          Object.assign(State.currencyPrefs, Currency.normalize({ from, to, rateDate }));
          Store.save({ sync });
        },
        options(selected, exclude = "") {
          return C.currencies.filter(cur => cur !== exclude).map(cur => `<option value="${cur}" ${cur === selected ? "selected" : ""}>${cur}</option>`).join("");
        },
        money(value, currency) {
          const amount = Number(value), digits = C.zero.has(currency) ? 0 : 2;
          const text = Number.isFinite(amount) ? new Intl.NumberFormat("en-US", { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(amount) : "0";
          return `${currency} ${text}`;
        }
      };

      const ItineraryEditor = {
        paint() {
          const r = Dom.refs;
          if (!r.btnToggleTripEdit) return;
          r.btnToggleTripEdit.textContent = State.ui.editTrip ? "關閉項目編輯" : "編輯項目";
          r.btnToggleTripEdit.classList.toggle("danger", State.ui.editTrip);
          if (r.tripEditPanel) r.tripEditPanel.hidden = !State.ui.editTrip;
          if (r.addDayForm) r.addDayForm.hidden = !State.ui.addDayForm;
          if (r.btnAddDayFormToggle) r.btnAddDayFormToggle.textContent = State.ui.addDayForm ? "收起新增日項目" : "＋新增日項目";
        },
        bind() {
          const r = Dom.refs;
          if (!r.btnToggleTripEdit || r.btnToggleTripEdit.dataset.bound) return;
          r.btnToggleTripEdit.dataset.bound = "1";
          r.btnToggleTripEdit.addEventListener("click", () => {
            State.ui.editTrip = !State.ui.editTrip;
            if (!State.ui.editTrip) State.ui.addDayForm = false;
            Notes.closeActive({ render:false });
            ItineraryEditor.paint();
            Render.render();
          });
          r.btnAddDayFormToggle?.addEventListener("click", () => {
            State.ui.addDayForm = !State.ui.addDayForm;
            ItineraryEditor.paint();
            if (State.ui.addDayForm) setTimeout(() => r.addDayForm?.elements.dayDate?.focus(), 0);
          });
          r.btnAddDayCancel?.addEventListener("click", () => {
            State.ui.addDayForm = false;
            r.addDayForm?.reset();
            ItineraryEditor.paint();
          });
          r.addDayForm?.addEventListener("submit", event => {
            event.preventDefault();
            ItineraryEditor.addDay(r.addDayForm);
          });
          ItineraryEditor.paint();
        },
        addDay(form) {
          const rawDate = form.elements.dayDate.value.trim(), date = dayDateLabel(rawDate), title = form.elements.dayTitle.value.trim();
          if (!rawDate) return alert("請選擇日期。"), form.elements.dayDate.focus();
          if (!title) return alert("請輸入項目名稱。"), form.elements.dayTitle.focus();
          if (State.itinerary.some(day => day.date === date)) {
            if (!confirm(`已經有日期「${date}」。仍要新增另一個日項目嗎？`)) return;
          }
          State.itinerary.push({ id:U.id(), date, title, people:null, items:[] });
          State.data.itinerary = State.itinerary = Data.sortItinerary(State.itinerary);
          Store.save();
          form.reset();
          State.ui.addDayForm = false;
          State.ui.editTrip = true;
          ItineraryEditor.paint();
          Render.render();
          Remote.setStatus(`已新增日項目：${date}｜${title}`);
        },
        findDay(dayId) {
          const index = State.itinerary.findIndex(day => String(day.id) === String(dayId));
          return index < 0 ? null : { day:State.itinerary[index], index };
        },
        cleanupItemKey(key) {
          delete State.done[key];
          if (State.notes?.item) delete State.notes.item[key];
          delete State.expenses[`item::${key}`];
          State.ui.expenseForms.delete(`item::${key}`);
          State.ui.expenseDetails.delete(`item::${key}`);
          State.ui.editingNotes.delete(Keys.note("item", key));
        },
        cleanupDay(day) {
          const customs = Trip.customOf(day);
          delete State.notes.day[day.date];
          delete State.expenses[`day::${day.date}`];
          State.ui.itemForms.delete(day.date);
          State.ui.expenseForms.delete(`day::${day.date}`);
          State.ui.expenseDetails.delete(`day::${day.date}`);
          for (let i = 0; i < day.items.length; i++) ItineraryEditor.cleanupItemKey(Keys.item(day, i));
          customs.forEach(item => ItineraryEditor.cleanupItemKey(Keys.custom(day.date, item.id)));
          delete State.customItems[day.date];
        },
        shiftOriginalItemKeys(day, deletedIndex, oldLength) {
          ItineraryEditor.cleanupItemKey(Keys.item(day, deletedIndex));
          for (let i = deletedIndex + 1; i < oldLength; i++) {
            const fromKey = Keys.item(day, i), toKey = Keys.item(day, i - 1);
            if (Object.prototype.hasOwnProperty.call(State.done, fromKey)) {
              State.done[toKey] = State.done[fromKey];
              delete State.done[fromKey];
            }
            if (State.notes?.item && Object.prototype.hasOwnProperty.call(State.notes.item, fromKey)) {
              State.notes.item[toKey] = State.notes.item[fromKey];
              delete State.notes.item[fromKey];
            }
            const fromExpense = `item::${fromKey}`, toExpense = `item::${toKey}`;
            if (Object.prototype.hasOwnProperty.call(State.expenses, fromExpense)) {
              State.expenses[toExpense] = State.expenses[fromExpense];
              delete State.expenses[fromExpense];
            }
          }
        },
        deleteDay(dayId) {
          const found = ItineraryEditor.findDay(dayId);
          if (!found) return;
          const { day, index } = found;
          if (!confirm(`確定要刪除這個日項目嗎？\n\n${day.date}｜${day.title}\n\n會同時移除此日項目底下的小項目、完成勾選，以及本機相關註記/記帳關聯。`)) return;
          ItineraryEditor.cleanupDay(day);
          State.itinerary.splice(index, 1);
          State.data.itinerary = State.itinerary;
          Store.save();
          Render.render();
          Remote.setStatus(`已刪除日項目：${day.date}｜${day.title}`);
        },
        deleteItem(button) {
          const found = ItineraryEditor.findDay(button.dataset.tripItemDelete);
          if (!found) return;
          const { day } = found;
          const isCustom = button.dataset.itemCustom === "1";
          const index = Number(button.dataset.itemIndex);
          const itemId = button.dataset.itemId;
          const source = isCustom ? Trip.customOf(day) : day.items;
          const item = isCustom ? source.find(row => String(row.id) === String(itemId)) : source[index];
          if (!item) return;
          if (!confirm(`確定要刪除這個小項目嗎？\n\n${Time.display(item)}｜${item.title || "未命名項目"}`)) return;
          if (isCustom) {
            State.customItems[day.date] = source.filter(row => String(row.id) !== String(itemId));
            if (!State.customItems[day.date].length) delete State.customItems[day.date];
            ItineraryEditor.cleanupItemKey(Keys.custom(day.date, itemId));
          } else {
            const oldLength = day.items.length;
            day.items.splice(index, 1);
            ItineraryEditor.shiftOriginalItemKeys(day, index, oldLength);
          }
          State.data.itinerary = State.itinerary;
          Store.save();
          Render.render();
          Remote.setStatus(`已刪除小項目：${item.title || "未命名項目"}`);
        }
      };

      const REMOTE_DEFAULT_URL = "https://script.google.com/macros/s/AKfycbz6Y5kPrSU4yToumGbXXjQs4zz8pM1LyTT1mHntskjG_AcKPMSbLjm3QiDMvrqvz2Jo/exec";
      const REMOTE_DEFAULT_TOKEN = "8866";

      const Remote = {
        defaults: () => ({ url:REMOTE_DEFAULT_URL, token:REMOTE_DEFAULT_TOKEN, key:"trip", autoLoad:false, autoSave:false, revision:null, updatedAt:"", trips:[] }),
        timer:0,
        normalize(config = {}) {
          const base = Remote.defaults();
          const revision = Number(config.revision);
          const trips = Array.isArray(config.trips) ? config.trips : [];
          return {
            ...base, ...config,
            url:String(config.url || REMOTE_DEFAULT_URL).trim(),
            token:String(config.token || REMOTE_DEFAULT_TOKEN).trim(),
            key:Store.keyOf(config.key),
            autoLoad:Boolean(config.autoLoad),
            autoSave:Boolean(config.autoSave),
            revision:Number.isFinite(revision) ? revision : null,
            updatedAt:String(config.updatedAt || ""),
            trips
          };
        },
        loadConfig: () => Remote.normalize(Store.parse(localStorage.getItem(C.LS.remote), Remote.defaults())),
        saveConfig(config = State.remote, { paint = true } = {}) {
          State.remote = Remote.normalize(config);
          localStorage.setItem(C.LS.remote, JSON.stringify(State.remote));
          if (paint) Remote.paint();
        },
        rememberConfig() {
          Remote.saveConfig(Remote.readForm(), { paint:false });
          AppTitle.paint(State.remote.key);
        },
        ready: () => Boolean(State.remote?.url && State.remote?.token),
        endpoint(action, key = State.remote.key) {
          const url = new URL(State.remote.url);
          url.searchParams.set("action", action);
          url.searchParams.set("token", State.remote.token);
          if (action !== "list") url.searchParams.set("key", Store.keyOf(key));
          return url.toString();
        },
        setStatus(message, error = false) {
          const el = Dom.refs.remoteStatus;
          if (!el) return;
          el.textContent = message || "";
          el.classList.toggle("error", Boolean(error));
        },
        renderTripOptions() {
          const select = Dom.refs.remoteTripSelect;
          if (!select) return;
          const current = Store.keyOf(State.remote.key);
          const rows = Array.isArray(State.remote.trips) ? State.remote.trips : [];
          const seen = new Set();
          const options = [`<option value="${esc(current)}">${esc(current)}${rows.some(row => row.key === current) ? "" : "（目前輸入）"}</option>`];
          seen.add(current);
          rows.forEach(row => {
            const key = Store.keyOf(row.key);
            if (seen.has(key)) return;
            seen.add(key);
            const label = row.title ? `${key}｜${row.title}` : key;
            options.push(`<option value="${esc(key)}">${esc(label)}</option>`);
          });
          select.innerHTML = options.join("");
          select.value = current;
        },
        paint() {
          const r = Dom.refs;
          if (!r.remoteUrl) return;
          r.remoteUrl.value = State.remote.url || "";
          r.remoteToken.value = State.remote.token || "";
          r.remoteTripKey.value = Store.keyOf(State.remote.key);
          r.remoteAutoLoad.checked = Boolean(State.remote.autoLoad);
          r.remoteAutoSave.checked = Boolean(State.remote.autoSave);
          Remote.renderTripOptions();
          AppTitle.paint(State.remote.key);
          const version = Number.isFinite(State.remote.revision) ? `revision ${State.remote.revision}` : "尚未載入遠端版本";
          Remote.setStatus(`旅程 ${Store.keyOf(State.remote.key)}｜${version}${State.remote.updatedAt ? `｜遠端更新 ${State.remote.updatedAt}` : ""}`);
        },
        readForm() {
          const r = Dom.refs;
          const key = Store.keyOf(r.remoteTripKey.value || r.remoteTripSelect.value || State.remote.key);
          const sameKey = key === State.remote.key;
          const matched = (State.remote.trips || []).find(row => Store.keyOf(row.key) === key);
          return Remote.normalize({
            ...State.remote,
            url:r.remoteUrl.value,
            token:r.remoteToken.value,
            key,
            autoLoad:r.remoteAutoLoad.checked,
            autoSave:r.remoteAutoSave.checked,
            revision:sameKey ? State.remote.revision : (Number.isFinite(Number(matched?.revision)) ? Number(matched.revision) : null),
            updatedAt:sameKey ? State.remote.updatedAt : (matched?.updatedAt || "")
          });
        },
        async request(action, options = {}, key = State.remote.key) {
          if (!Remote.ready()) throw new Error("請先填入 Apps Script URL 與 API Token。");
          const response = await fetch(Remote.endpoint(action, key), options);
          const text = await response.text();
          let data;
          try { data = JSON.parse(text); } catch { throw new Error(`API 回傳不是 JSON：${text.slice(0, 120)}`); }
          if (!data.ok) throw Object.assign(new Error(data.message || "遠端同步失敗"), { payload:data });
          return data;
        },
        async list() {
          try {
            Remote.saveConfig(Remote.readForm());
            Remote.setStatus("正在載入雲端旅程清單…");
            const result = await Remote.request("list");
            State.remote.trips = Array.isArray(result.trips) ? result.trips : [];
            const matched = State.remote.trips.find(row => Store.keyOf(row.key) === State.remote.key);
            if (matched) Object.assign(State.remote, Remote.normalize({ ...State.remote, revision:matched.revision, updatedAt:matched.updatedAt }));
            localStorage.setItem(C.LS.remote, JSON.stringify(State.remote));
            Remote.paint();
            Remote.setStatus(`已載入 ${State.remote.trips.length} 筆旅程清單。`);
          } catch (error) {
            Remote.setStatus(error.message || String(error), true);
            alert(error.message || String(error));
          }
        },
        async load({ ask = true } = {}) {
          try {
            Remote.saveConfig(Remote.readForm());
            const key = Store.keyOf(State.remote.key);
            if (ask && !confirm(`要從 Google Sheet 載入「${key}」這筆旅程資料嗎？\n\n會覆蓋：日項目、預設小項目、完成勾選、自訂小項目。\n會保留：這筆旅程在本機的註記、記帳明細與幣別偏好。`)) return;
            Remote.setStatus(`正在從雲端載入「${key}」共享行程資料…`);
            const result = await Remote.request("load", {}, key);
            Store.replace(result.data || {}, { preservePrivate:true, tripKey:key });
            Object.assign(State.remote, Remote.normalize({ ...State.remote, key, revision:result.revision, updatedAt:result.updatedAt }));
            localStorage.setItem(C.LS.remote, JSON.stringify(State.remote));
            Render.render();
            Remote.paint();
            Remote.setStatus(`已從雲端載入「${key}」｜revision ${State.remote.revision}${State.remote.updatedAt ? `｜${State.remote.updatedAt}` : ""}`);
          } catch (error) {
            Remote.setStatus(error.message || String(error), true);
            alert(error.message || String(error));
          }
        },
        async save({ silent = false } = {}) {
          try {
            Remote.saveConfig(Remote.readForm());
            if (!Remote.ready()) return !silent && Remote.setStatus("請先填入 Apps Script URL 與 API Token。", true);
            const key = Store.keyOf(State.remote.key);
            State.data.tripKey = key;
            if (!Number.isFinite(State.remote.revision)) {
              const message = `尚未載入「${key}」的遠端 revision。\n\n如果這是新旅程，請確認 key 沒有和現有旅程重複後再同步。`;
              if (!silent && !confirm(`${message}\n\n仍要嘗試建立/同步這筆旅程嗎？`)) return Remote.setStatus(message, true);
            }
            Store.syncStateData();
            Remote.setStatus(`正在同步「${key}」共享行程資料到雲端…`);
            const result = await Remote.request("save", {
              method:"POST",
              headers:{ "Content-Type":"text/plain;charset=utf-8" },
              body:JSON.stringify({ key, revision:State.remote.revision, data:Store.shared(State.data, key) })
            }, key);
            Object.assign(State.remote, Remote.normalize({ ...State.remote, key, revision:result.revision, updatedAt:result.updatedAt }));
            localStorage.setItem(C.LS.remote, JSON.stringify(State.remote));
            Store.save({ sync:false });
            Remote.paint();
            Remote.setStatus(`已同步「${key}」到雲端｜revision ${State.remote.revision}${State.remote.updatedAt ? `｜${State.remote.updatedAt}` : ""}`);
          } catch (error) {
            const payload = error.payload || {};
            const message = payload.code === "CONFLICT" ? `${error.message}\n請先從雲端載入最新資料。` : (error.message || String(error));
            Remote.setStatus(message, true);
            if (!silent) alert(message);
          }
        },
        queueSave() {
          clearTimeout(Remote.timer);
          if (!State?.remote?.autoSave || !Remote.ready() || !Number.isFinite(State.remote.revision)) return;
          Remote.timer = setTimeout(() => Remote.save({ silent:true }), 900);
        },
        panel(open) {
          Dom.refs.syncPanel.hidden = !open;
          Dom.refs.btnToggleSync.textContent = open ? "關閉同步" : "雲端同步";
          Dom.refs.btnToggleSync.setAttribute("aria-expanded", String(open));
          if (open) {
            Remote.paint();
            setTimeout(() => Remote.list(), 0);
          }

        },
        bind() {
          const r = Dom.refs;
          r.btnToggleSync.addEventListener("click", () => Remote.panel(r.syncPanel.hidden));
          r.remoteTripSelect.addEventListener("change", () => { r.remoteTripKey.value = r.remoteTripSelect.value; Remote.saveConfig(Remote.readForm()); });
          [r.remoteUrl, r.remoteToken, r.remoteTripKey].forEach(input => input.addEventListener("input", Remote.rememberConfig));
          [r.remoteAutoLoad, r.remoteAutoSave].forEach(input => input.addEventListener("change", Remote.rememberConfig));
          r.remoteTripKey.addEventListener("change", () => Remote.saveConfig(Remote.readForm()));
          r.btnRemoteLoad.addEventListener("click", () => Remote.load({ ask:true }));
          r.btnRemoteSave.addEventListener("click", () => Remote.save());

          Remote.panel(false);
          if (State.remote.autoLoad && Remote.ready()) setTimeout(() => Remote.load({ ask:false }), 150);
        }
      };

      const appData = Store.load();
      const State = {
        data:appData,
        itinerary:appData.itinerary,
        done:appData.done,
        notes:appData.notes,
        expenses:appData.expenses,
        customItems:appData.customItems,
        currencyPrefs:Currency.normalize(appData.currencyPrefs),
        remote:Remote.loadConfig(),
        ui: { editingNotes:new Set(), expenseForms:new Set(), expenseDetails:new Set(), itemForms:new Set(), noteCloseTimer:0, editTrip:false, addDayForm:false }
      };

      Store.save({ sync:false });

      const Dom = {
        refs:{},
        cache() {
          ["appTitle","appTitleTrip","days","q","filterType","filterStatus","stats","indexPanel","syncPanel","btnToggleSync","btnToggleIndex","btnExpandAll","btnCollapseAll","btnReset","remoteUrl","remoteToken","remoteTripSelect","remoteTripKey","remoteAutoLoad","remoteAutoSave","btnToggleTripEdit","tripEditPanel","btnAddDayFormToggle","addDayForm","btnAddDayCancel","btnRemoteLoad","btnRemoteSave","remoteStatus"].forEach(id => Dom.refs[id] = document.getElementById(id));
        },
        focusByData(selector, dataKey, value, child = "") {
          const focus = () => {
            const host = $$(selector).find(el => el.dataset[dataKey] === value);
            const target = child && host ? $(child, host) : host;
            if (!target) return false;
            target.focus({ preventScroll:true });
            if (typeof target.setSelectionRange === "function") {
              const end = String(target.value ?? "").length;
              target.setSelectionRange(end, end);
            }
            return document.activeElement === target;
          };
          requestAnimationFrame(() => { if (!focus()) setTimeout(focus, 0); });
        }
      };

      const AppTitle = {
        displayName(key = "") {
          const value = Store.keyOf(key || State?.remote?.key || State?.data?.tripKey || "旅程");
          return value || "旅程";
        },
        paint(key = "") {
          const name = AppTitle.displayName(key);
          if (Dom.refs.appTitleTrip) Dom.refs.appTitleTrip.textContent = name;
          document.title = `${name} 行程表`;
        }
      };

      const Keys = {
        item: (day, index) => `${day.date}::${index}`,
        custom: (date, id) => `${date}::custom::${id}`,
        note: (kind, id) => `${kind}::${id}`
      };
      const U = {
        id: () => window.crypto?.randomUUID?.() ?? `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        toggle: (set, key) => set[set.has(key) ? "delete" : "add"](key),

        safeUrl(value) {
          const raw = String(value ?? "").trim();

      const Time = {
        explicit(value) {
          const m = String(value ?? "").match(/(\d{1,2}):(\d{2})/);
          if (!m) return null;
          const hour = Number(m[1]), minute = Number(m[2]);
          return hour >= 0 && hour < 24 && minute >= 0 && minute < 60 ? hour * 60 + minute : null;
        },
        code: value => C.timeWeight[String(value ?? "").trim()] ?? null,
        minutes: item => Time.explicit(item.time) ?? Time.code(item.timeCode) ?? Time.code(item.time),
        display(item) {
          const code = String(item.timeCode ?? "").trim(), exact = String(item.time ?? "").trim();
          return code && exact ? `${code} ${exact}` : exact || code || "-";
        },
        sort(items, fallbackStart = 1440) {
          const anchors = items.map((item, index) => [index, Time.minutes(item)]).filter(([, min]) => min !== null);
          const last = Math.max(items.length - 1, 0);
          return items.map((item, index) => {
            const exact = Time.minutes(item);
            if (exact !== null) return { ...item, __order:item.__order ?? index, __sortTime:exact };
            const prev = anchors.filter(([i]) => i < index).at(-1), next = anchors.find(([i]) => i > index);
            let sortTime = fallbackStart + index;
            if (prev && next && next[1] >= prev[1]) sortTime = prev[1] + ((next[1] - prev[1]) / (next[0] - prev[0])) * (index - prev[0]);
            else if (prev) sortTime = prev[1] + ((1440 - prev[1]) / (Math.max(last - prev[0], 1) + 1)) * (index - prev[0]);
            else if (next) sortTime = (next[1] / (next[0] + 1)) * (index + 1);
            return { ...item, __order:item.__order ?? index, __sortTime:sortTime };
          }).sort((a, b) => a.__sortTime - b.__sortTime || a.__order - b.__order);
        }
      };

      const Notes = {

            : `<div class="noteArea" data-note-open="${esc(key)}" role="button" tabindex="0" title="編輯備註" aria-label="編輯備註"><p class="noteText${hasText ? "" : " empty"}">${hasText ? esc(text) : "尚無備註"}</p></div>`;

      const Trip = {
        customOf: day => Array.isArray(State.customItems[day.date]) ? State.customItems[day.date] : [],
        indexed(day) {
          const original = Time.sort(day.items.map((item, i) => ({ ...item, __idx:i, __key:Keys.item(day, i), __order:i })));
          const start = day.items.length;
          const custom = Trip.customOf(day).map((item, i) => ({ ...item, __idx:start + i, __key:Keys.custom(day.date, item.id), __custom:true, __order:start + i, __sortTime:Time.minutes(item) ?? 1440 + start + i }));
          return [...original, ...custom].sort((a, b) => a.__sortTime - b.__sortTime || a.__order - b.__order);
        },
        done: item => Boolean(State.done[item.__key]),
        matches(day, item) {
          const { q, filterType, filterStatus } = Dom.refs;
          const query = q.value.trim().toLowerCase(), done = Trip.done(item), key = item.__key;
          if (filterType.value !== "all" && item.type !== filterType.value) return false;
          if (filterStatus.value === "todo" && done) return false;
          if (filterStatus.value === "done" && !done) return false;
          if (!query) return true;
          const linkText = Array.isArray(item.links) ? item.links.map(link => `${link.title || ""} ${link.url || ""}`).join(" ") : "";
          return [day.date, day.title, day.people, item.timeCode, item.time, item.title, item.detail, linkText, item.place, Notes.get("day", day.date), Notes.get("item", key), Expenses.text(`day::${day.date}`), Expenses.text(`item::${key}`)].join(" ").toLowerCase().includes(query);
        },
        openDates: () => new Set($$("details.day[open]", Dom.refs.days).map(day => day.dataset.date)),
        vm() {
          const openDates = Trip.openDates(), hasQuery = Dom.refs.q.value.trim().length > 0;

            return { day, dayIndex, allItems, visibleItems, doneCount:allItems.reduce((sum, item) => sum + Number(Trip.done(item)), 0), isOpen:openDates.has(day.date) || State.ui.itemForms.has(day.date) || dayIndex === 0 || hasQuery, shouldRender:visibleItems.length > 0 || State.ui.itemForms.has(day.date) || State.ui.editTrip || allItems.length === 0 };
          }) };

      const CustomItems = {

        timeCodeOptions: (selected = "") => ["", ...Object.keys(C.timeWeight)].map(code => `<option value="${esc(code)}" ${code === selected ? "selected" : ""}>${code || "---"}</option>`).join(""),
        linkRow: ({ add = false } = {}) => `<div class="itemLinkRow" data-item-link-row><input name="linkTitle" placeholder="連結標題" autocomplete="off" /><input name="linkUrl" inputmode="url" placeholder="網址" autocomplete="off" /><button type="button" data-${add ? "item-link-add" : "item-link-remove"} title="${add ? "新增一列連結" : "移除此列連結"}" aria-label="${add ? "新增一列連結" : "移除此列連結"}">${add ? "+" : "×"}</button></div>`,
        form(day) {

      const Expenses = {

          </section>`;

          return Expenses.panel({ key, title, hint:rows.length ? `${rows.length} 筆紀錄` : "尚無紀錄", rows, add, form:open, aria:"本面板花費小計", empty:"" });
        },
        daily(day) {
          const rows = Expenses.rows(Expenses.dayKeys(day));
          return Expenses.panel({ icon:"🧾", title:"當日總花費", hint:rows.length ? `${rows.length} 筆紀錄` : "尚無紀錄", rows, variant:"dailyExpensePanel", note:"包含今日額外記帳與當日所有細項記帳。", aria:`${day.date} 當日總花費`, labels:["當日原幣總計", "當日換算總計"] });
        },
        trip() {

          return Expenses.panel({ icon:"🧾", title:"全部天數金額開銷", hint:rows.length ? `${rows.length} 筆紀錄` : "尚無紀錄", rows, variant:"tripSummaryPanel", note:"包含所有「每日記帳」與各行程細項的記帳。", aria:"全部天數金額開銷", labels:["全旅程原幣總計", "全旅程換算總計"], children });
        },
        dailyRow(day) {

        },
        form(key) {
          const { from, to, rateDate } = State.currencyPrefs;
          const date = esc(clampRateDate(rateDate));
          return `<form class="expenseForm" data-expense-form="${esc(key)}"><textarea name="name" placeholder="購物名目，可分行補充型號、店名或備註" autocomplete="off" required></textarea><input name="amount" inputmode="decimal" placeholder="金額" required /><input name="rateDate" type="date" min="${C.minRateDate}" max="${todayISO()}" value="${date}" aria-label="匯率日期" title="匯率日期" required /><select name="from" aria-label="原始幣別">${Currency.options(from)}</select><select name="to" aria-label="目標幣別">${Currency.options(to, from)}</select><button class="primary" type="submit">確認</button></form>`;
        },
        listHtml(key, rows = Expenses.list(key)) {
          const showDetail = key && State.ui.expenseDetails.has(key);
          return !rows.length || !key ? "" : `<ul class="expenseList">${rows.map(row => {
            const detail = showDetail ? `<span class="expenseMeta">｜匯率 ${esc(Number(row.rate).toFixed(6))}｜${esc(row.date || row.requestedDate || "latest")}</span>` : "";
            return `<li><div class="expenseMain"><span class="expenseNameBox"><span aria-hidden="true">🛍️</span><span class="expenseNameText">${esc(row.name)}</span></span><span class="expenseInfo">${esc(Currency.money(row.amount, row.from))} → <strong>${esc(Currency.money(row.converted, row.to))}</strong>${detail}</span></div><button class="expenseDelete" type="button" data-expense-delete="${esc(key)}" data-expense-id="${esc(row.id)}" title="刪除這筆">×</button></li>`;
          }).join("")}</ul>`;
        },
        syncSelects(form) {
          const from = C.currencies.includes(form.elements.from.value) ? form.elements.from.value : State.currencyPrefs.from;
          const to = form.elements.to.value !== from && C.currencies.includes(form.elements.to.value) ? form.elements.to.value : C.currencies.find(cur => cur !== from);
          form.elements.to.innerHTML = Currency.options(to, from);
          Currency.save(from, to, form.elements.rateDate?.value, { sync:false });
        },
        async fetchRate(from, to, rateDate) {
          const date = clampRateDate(rateDate);
          if (from === to) return { rate:1, date };
          const params = new URLSearchParams({ base:from, quotes:to, date });
          const response = await fetch(`https://api.frankfurter.dev/v2/rates?${params}`);
          if (!response.ok) throw new Error("匯率查詢失敗");
          const data = await response.json();
          const row = Array.isArray(data) ? data[0] : null;
          const rate = Number(row?.rate ?? data?.rates?.[to] ?? data?.rate);
          if (!Number.isFinite(rate)) throw new Error("查不到這組幣別的匯率");
          return { rate, date:row?.date || data?.date || date };
        },
        save(key, row) {
          State.expenses[key] = [...Expenses.list(key), row];
          Store.save({ sync:false });
        },
        delete(key, id) {
          State.expenses[key] = Expenses.list(key).filter(row => row.id !== id);
          if (!State.expenses[key].length) delete State.expenses[key];
          Store.save({ sync:false });
        },
        confirmDelete(key, id) {
          const row = Expenses.list(key).find(item => item.id === id);
          const detail = row ? `\n\n${row.name.trim() || "未命名帳目"}\n${Currency.money(row.amount, row.from)} → ${Currency.money(row.converted, row.to)}` : "";
          return confirm(`確定要刪除這筆帳目嗎？${detail}\n\n刪除後無法復原。`);
        },
        async submit(form) {
          const button = $("button[type=submit]", form), key = form.dataset.expenseForm;
          const rawName = form.elements.name.value.replace(/\r\n?/g, "\n"), name = rawName.trim();
          const amount = Number(form.elements.amount.value.replaceAll(",", "").trim());
          const { from, to, rateDate } = form.elements;
          Currency.save(from.value, to.value, rateDate.value, { sync:false });
          if (!name || !Number.isFinite(amount) || amount <= 0) return alert("請輸入購物名目與大於 0 的金額。");
          try {
            button.disabled = true; button.textContent = "查中…";
            const rateResult = await Expenses.fetchRate(from.value, to.value, rateDate.value);
            Expenses.save(key, { id:U.id(), name:rawName, amount, from:from.value, to:to.value, ...rateResult, converted:amount * rateResult.rate, requestedDate:clampRateDate(rateDate.value), createdAt:new Date().toISOString() });
            State.ui.expenseForms.delete(key);
            Render.render();
          } catch (error) {
            alert(`${error.message || "匯率查詢失敗"}，請確認網路連線後再試一次。`);
            button.disabled = false; button.textContent = "確認";
          }
        }
      };

      const Render = {
        render() {
          const vm = Trip.vm();
          Dom.refs.days.innerHTML = vm.days.filter(day => day.shouldRender).map(Render.day).join("") + Render.tripSummary(vm.openDates, vm.hasQuery);
          Render.stats();
        },
        day(vm) {
          const { day, allItems, visibleItems, doneCount, isOpen } = vm;
          const editDelete = State.ui.editTrip ? `<button class="danger addItemBtn tripDeleteBtn" type="button" data-trip-day-delete="${esc(day.id)}" title="刪除這個日項目" aria-label="刪除這個日項目">刪除日項目</button>` : "";
          const cards = visibleItems.length ? visibleItems.map(item => Render.card(day, item)).join("") : `<div class="empty">目前沒有小項目。</div>`;
          const dayNoteKey = Keys.note("day", day.date), hasDayNote = Notes.has("day", day.date), dayNoteOpen = State.ui.editingNotes.has(dayNoteKey);
          const dayExpenseKey = `day::${day.date}`, dayExpenseRows = Expenses.list(dayExpenseKey), dayExpenseOpen = State.ui.expenseForms.has(dayExpenseKey);
          const dailyRows = Expenses.rows(Expenses.dayKeys(day));
          const dayTools = `<div class="dayToolActions" aria-label="今日功能">${U.actionBtn({ icon:"📝", action:"note-toggle", key:dayNoteKey, title:hasDayNote ? "編輯今日備註" : "新增今日備註", active:hasDayNote || dayNoteOpen })}${U.actionBtn({ icon:dayExpenseOpen ? "×" : "🧾", action:"expense-toggle", key:dayExpenseKey, title:dayExpenseOpen ? "收起今日記帳表單" : "新增今日記帳", active:Boolean(dayExpenseRows.length) || dayExpenseOpen })}</div>`;
          const dayNotePanel = (hasDayNote || dayNoteOpen) ? `<div class="noteBox"><div class="itemTitle">今日備註</div>${Notes.render("day", day.date, "在這裡寫備註…")}</div>` : "";
          const dayExpensePanel = (dayExpenseRows.length || dayExpenseOpen) ? Expenses.forNote(dayExpenseKey, { add:false, title:"今日記帳" }) : "";
          const dailyPanel = dailyRows.length ? Expenses.daily(day) : "";
          return `<details class="day" data-date="${esc(day.date)}"${isOpen ? " open" : ""}><summary><div class="dayLeft"><div class="dayTitle">${esc(day.date)}｜${esc(day.title)}</div><div class="dayMeta">${day.people ? `（${esc(day.people)}）` : ""}</div><div class="pill">完成 ${doneCount}/${allItems.length}</div></div><div class="dayActions">${editDelete}<button class="primary addItemBtn" type="button" data-item-form-toggle="${esc(day.date)}" title="新增小項目" aria-label="新增小項目">＋</button></div></summary><div class="content">${State.ui.itemForms.has(day.date) ? CustomItems.form(day) : ""}<div class="cards">${cards}</div>${dayTools}${dayNotePanel}${dayExpensePanel}${dailyPanel}</div></details>`;
        },
        card(day, item) {
          const done = Trip.done(item), [typeText, typeClass] = C.type[item.type] ?? C.type.other;
          const key = item.__key, noteKey = Keys.note("item", key), expenseKey = `item::${key}`, strike = done ? " strike" : "";
          const hasNote = Notes.has("item", key), noteOpen = State.ui.editingNotes.has(noteKey);
          const expenseRows = Expenses.list(expenseKey), expenseOpen = State.ui.expenseForms.has(expenseKey);
          const place = item.place ? `<div class="tags"><span class="tag place-tag" data-place="${esc(item.place)}">📍 ${esc(item.place)}</span></div>` : "";
          const links = (Array.isArray(item.links) ? item.links : []).map(link => ({ title:link.title || "連結", url:U.safeUrl(link.url) })).filter(link => link.url);
          const linkButtons = links.length ? `<div class="linkButtons">${links.map(link => `<a class="tag linkBtn" href="${esc(link.url)}" target="_blank" rel="noopener noreferrer" title="${esc(link.url)}">🔗 ${esc(link.title)}</a>`).join("")}</div>` : "";
          const expenseTopAction = expenseRows.length ? "" : U.actionBtn({ icon:expenseOpen ? "×" : "🧾", action:"expense-toggle", key:expenseKey, title:expenseOpen ? "收起記帳表單" : "新增記帳", active:expenseOpen });
          const deleteAction = State.ui.editTrip ? `<button class="itemActionBtn tripDeleteBtn" type="button" data-trip-item-delete="${esc(day.id)}" data-item-index="${esc(item.__idx)}" data-item-id="${esc(item.id || "")}" data-item-custom="${item.__custom ? "1" : "0"}" title="刪除這個小項目" aria-label="刪除這個小項目">🗑️</button>` : "";
          const actions = `<div class="cardActions">${deleteAction}${U.actionBtn({ icon:"📝", action:"note-toggle", key:noteKey, title:hasNote ? "編輯備註" : "新增備註", active:hasNote || noteOpen })}${expenseTopAction}</div>`;
          const body = `${hasNote || noteOpen ? Notes.render("item", key, "這個行程細項的備註…") : ""}${expenseRows.length || expenseOpen ? Expenses.forNote(expenseKey, { add:Boolean(expenseRows.length) }) : ""}`;
          return `<article class="cardItem">${actions}<div class="itemHeader"><div class="check"><input data-done-key="${esc(key)}" type="checkbox" ${done ? "checked" : ""} aria-label="完成" /></div><div class="itemMain"><div class="itemTitle${strike}">${esc(Time.display(item))}｜${esc(item.title)}</div>${item.detail ? `<div class="itemSub${strike}">${esc(item.detail)}</div>` : ""}${place}${linkButtons}</div></div>${body ? `<div class="itemBody">${body}</div>` : ""}<span class="tag ${typeClass} corner"><span class="corner-text">${typeText}</span></span></article>`;
        },
        tripSummary(openDates, hasQuery) {
          const key = "__trip_summary__", open = openDates.has(key) || hasQuery ? " open" : "";
          return `<details class="day tripSummary" data-date="${key}"${open}><summary><div class="dayLeft"><div class="dayTitle">旅程總結｜全部天數開銷</div><div class="pill">總結</div></div></summary><div class="content">${Expenses.trip()}<div class="noteBox"><div class="itemTitle">總結註記</div>${Notes.render("summary", "trip", "在這裡寫旅程總結、心得或結算備註…")}</div></div></details>`;
        },
        stats() {
          let total = 0, done = 0, shown = 0;
          State.itinerary.forEach(day => Trip.indexed(day).forEach(item => { total++; done += Number(Trip.done(item)); shown += Number(Trip.matches(day, item)); }));
          Dom.refs.stats.textContent = `總項目：${total}｜已完成：${done}｜目前篩選顯示：${shown}`;
        },
        indexPanel(open) {
          Dom.refs.indexPanel.hidden = !open;
          Dom.refs.btnToggleIndex.textContent = open ? "關閉索引" : "開啟索引";
          Dom.refs.btnToggleIndex.setAttribute("aria-expanded", String(open));
        }
      };

      const Events = {
        bind() {
          const r = Dom.refs;
          const renderClean = () => (Notes.closeActive({ render:false }), Render.render());
          r.btnToggleIndex.addEventListener("click", () => (Notes.closeActive({ render:false }), Render.indexPanel(r.indexPanel.hidden)));
          Render.indexPanel(false);
          Remote.bind();
          r.q.addEventListener("input", renderClean);
          [r.filterType, r.filterStatus].forEach(input => input.addEventListener("change", renderClean));
          r.btnExpandAll.addEventListener("click", () => (Notes.closeActive({ render:false }), $$("details.day").forEach(day => day.open = true)));
          r.btnCollapseAll.addEventListener("click", () => (Notes.closeActive({ render:false }), $$("details.day").forEach(day => day.open = false)));
          r.btnReset.addEventListener("click", Events.reset);
          [["change", Events.change], ["input", Events.input], ["focusout", Events.focusout], ["focusin", Events.focusin], ["submit", Events.submit], ["keydown", Events.keydown], ["click", Events.click]].forEach(([name, handler]) => r.days.addEventListener(name, handler));
          document.addEventListener("click", Events.closeNotesOnOutsideClick);
          document.addEventListener("visibilitychange", () => { if (document.hidden) Notes.closeActive(); });
          window.addEventListener("blur", () => Notes.closeActive());
        },
        reset() {
          if (!confirm("要清除這個網頁保存的「共享行程資料」、「勾選完成」、「每日備註」、「細項備註」、「總結註記」、「自訂小項目」、「購物換算紀錄」與「幣別偏好」嗎？清除後會還原成這份 HTML 內建行程。")) return;
          Store.clear();
          location.reload();
        },
        change(event) {
          const form = event.target.closest("[data-expense-form]");
          if (form && event.target.matches("select")) return Expenses.syncSelects(form);
          if (form && event.target.matches('input[name="rateDate"]')) return Currency.save(form.elements.from.value, form.elements.to.value, form.elements.rateDate.value, { sync:false });
          const key = event.target.dataset.doneKey;
          if (!key) return;
          Notes.closeActive({ render:false });
          State.done[key] = event.target.checked;
          Store.save();
          Render.render();
        },
        input(event) {
          const editor = event.target.closest("[data-note-editor]");
          if (editor) Notes.save(editor.dataset.noteKind, editor.dataset.noteId, editor.value);
        },
        focusout(event) {
          const editor = event.target.closest("[data-note-editor]");
          if (!editor) return;
          clearTimeout(State.ui.noteCloseTimer);
          State.ui.noteCloseTimer = setTimeout(() => {
            const active = document.activeElement;
            if (!active?.closest?.("[data-note-editor],[data-note-open],[data-note-toggle]")) Notes.close(editor);
          }, 80);
        },
        focusin(event) {
          const preview = event.target.closest("[data-note-open]");
          if (preview) Notes.open(preview.dataset.noteOpen);
        },
        async submit(event) {
          const itemForm = event.target.closest("[data-item-form]");
          if (itemForm) return event.preventDefault(), CustomItems.submit(itemForm);
          const expenseForm = event.target.closest("[data-expense-form]");
          if (!expenseForm) return;
          event.preventDefault();
          await Expenses.submit(expenseForm);
        },
        keydown(event) {
          const preview = event.target.closest("[data-note-open]");
          if (!preview || !["Enter", " "].includes(event.key)) return;
          event.preventDefault();
          Notes.open(preview.dataset.noteOpen);
        },
        closeNotesOnOutsideClick(event) {
          if (!State.ui.editingNotes.size) return;
          if (event.target.closest("[data-note-editor],[data-note-open],[data-note-toggle]")) return;
          Notes.closeActive({ render:false });
          setTimeout(Render.render, 0);
        },
        click(event) {
          const routes = [
            ["[data-trip-day-delete]", target => { event.preventDefault(); event.stopPropagation(); ItineraryEditor.deleteDay(target.dataset.tripDayDelete); }],
            ["[data-trip-item-delete]", target => { event.preventDefault(); ItineraryEditor.deleteItem(target); }],
            ["[data-item-form-toggle]", (target) => { event.preventDefault(); event.stopPropagation(); Notes.closeActive({ render:false }); const date = target.dataset.itemFormToggle; U.toggle(State.ui.itemForms, date); Render.render(); if (State.ui.itemForms.has(date)) Dom.focusByData("[data-item-form]", "itemForm", date, 'select[name="timeCode"]'); }],
            ["[data-item-link-add]", target => { event.preventDefault(); CustomItems.addLinkRow(target); }],
            ["[data-item-link-remove]", target => { event.preventDefault(); CustomItems.removeLinkRow(target); }],
            ["[data-item-form-cancel]", (target) => { event.preventDefault(); State.ui.itemForms.delete(target.dataset.itemFormCancel); Render.render(); }],
            ["[data-note-toggle]", target => Notes.open(target.dataset.noteToggle)],
            ["[data-note-open]", target => Notes.open(target.dataset.noteOpen)],
            ["[data-expense-detail-toggle]", target => { Notes.closeActive({ render:false }); U.toggle(State.ui.expenseDetails, target.dataset.expenseDetailToggle); Render.render(); }],
            ["[data-expense-toggle]", target => { Notes.closeActive({ render:false }); const key = target.dataset.expenseToggle; U.toggle(State.ui.expenseForms, key); Render.render(); Dom.focusByData("[data-expense-form]", "expenseForm", key, 'textarea[name="name"]'); }],
            ["[data-expense-delete]", target => { const { expenseDelete, expenseId } = target.dataset; if (Expenses.confirmDelete(expenseDelete, expenseId)) Expenses.delete(expenseDelete, expenseId), Render.render(); }],
            ["[data-place]", target => window.open(U.mapLink(target.dataset.place), "_blank")]
          ];
          for (const [selector, handler] of routes) {
            const target = event.target.closest(selector);
            if (target) return handler(target);
          }
        }
      };

      const App = { init: () => (Dom.cache(), AppTitle.paint(State.remote.key), Events.bind(), Render.render()) };
      App.init();
    })();
  </script>
</body>
</html>
